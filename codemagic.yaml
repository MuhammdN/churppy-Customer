integrations:
  app_store_connect: "Churppy Customer"

workflows:
  ios_appstore:
    name: iOS App Store (TestFlight)
    environment:
      vars:
        APP_ID: "com.kathryn.churppyCustomer" # apna bundle ID yahan likha rahe
        DEVELOPMENT_TEAM_ID: "7H4229UD7R"     # apna Apple Team ID
      flutter: stable
      xcode: latest

    scripts:
      - name: 🔹 Clean & Get Dependencies
        script: |
          flutter clean
          flutter pub get

      - name: 🔹 Build iOS Release (no codesign)
        script: |
          flutter build ios --release --no-codesign

      - name: 🔹 Set up Keychain & Fetch Certificates
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$APP_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: 🔹 Archive iOS Build
        script: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
                     -scheme Runner \
                     -configuration Release \
                     -archivePath $CM_BUILD_DIR/Runner.xcarchive \
                     archive DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM_ID \
                     CODE_SIGN_STYLE=Manual
          cd ..

      - name: 🔹 Export IPA
        script: |
          cd ios
          xcodebuild -exportArchive \
                     -archivePath $CM_BUILD_DIR/Runner.xcarchive \
                     -exportOptionsPlist ExportOptions.plist \
                     -exportPath $CM_BUILD_DIR/ipa
          cd ..

      - name: 🔹 Upload to TestFlight
        script: |
          app-store-connect publish \
            --path "$CM_BUILD_DIR/ipa/Runner.ipa"

    artifacts:
      - build/ios/ipa/*.ipa
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
